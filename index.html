<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MUSICANUEVA</title>
    <style>
        body { 
            /* Recuperamos el fondo con imagen de artistas urbanos */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://postimg.cc'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        /* VOLVEMOS A TU DISEÑO ORIGINAL CIAN */
        .tarjeta { 
            background: #000; 
            border: 2px solid #00f7ff; 
            border-radius: 15px; 
            width: 300px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 0 20px #00f7ff; 
        }
        .cubrir { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        h3 { color: #00f7ff; margin-bottom: 15px; font-size: 1.1em; }
        audio { width: 100%; height: 35px; margin-bottom: 20px; filter: invert(1); }
        .boton-descarga { 
            display: block; 
            background: #00f7ff; 
            color: #000; 
            padding: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 8px; 
            text-transform: uppercase; 
        }
        .boton-descarga:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="tarjeta">
        <!-- RECUPERAMOS TUS ENLACES REALES DE ARCHIVE -->
        <img src="https://archive.org" class="cubrir">
        <h3>LA BELLA LUZ - COQUETA</h3>
        
        <audio controls src="https://archive.org"></audio>
        
        <a href="https://archive.org" 
           class="boton-descarga" 
           download="La_Bella_Luz_Coqueta.mp3">
           DESCARGAR MP3
        </a>
    </div>

</body>
</html>
