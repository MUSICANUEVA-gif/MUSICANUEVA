<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSICA NUEVA</title>
    <style>
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('fondo.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            align-content: flex-start;
            gap: 20px; 
            min-height: 100vh; 
        }
        .header-principal {
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
        }
        .header-principal h1 {
            color: #00f7ff;
            text-shadow: 0 0 10px #00f7ff;
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .header-principal h2 {
            color: #00f7ff;
            text-shadow: 0 0 10px #00f7ff;
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-top: 0;
            letter-spacing: 2px;
        }

        .contenedor-buscador {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        #buscador {
            width: 90%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #00f7ff;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.2);
        }

        .tarjeta { 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00f7ff; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 280px; 
            padding: 15px 15px 0px 15px; 
            text-align: center; 
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.4); 
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .hidden { display: none; }

        .cubrir { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            display: block;
        }
        h3 { color: #fff; margin-bottom: 15px; font-size: 1.1em; height: 1.2em; overflow: hidden; text-transform: uppercase; }
        audio { 
            width: 100%; 
            height: 35px; 
            margin-bottom: 15px; 
            filter: invert(1); 
        }
        .boton-de-descarga { 
            display: block; 
            background: #00f7ff; 
            color: #000; 
            padding: 18px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.9em;
            margin: 0 -15px; 
            transition: background 0.3s;
        }
        .boton-de-descarga:hover { background: #fff; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="header-principal">
        <h1>MUSICA NUEVA</h1>
        <h2>DJ PSICOSIS</h2>
    </div>

    <div class="contenedor-buscador">
        <input type="text" id="buscador" placeholder="Buscar canción o artista...">
    </div>

    <!-- AQUÍ EMPIEZAN LAS TARJETAS (NUEVAS ARRIBA) -->

    <!-- 1. LO MÁS NUEVO: TOKISHA -->
    <div class="tarjeta">
        <img src="https://dn710209.ca.archive.org/0/items/los-de-la-pina-totoy-el-frio-tokisha/cover.jpg" class="cubrir" alt="Carátula Tokisha">
        <h3>Los De La Piña, Totoy El Frio - TOKISHA</h3>
        <audio controls src="https://dn710209.ca.archive.org/0/items/los-de-la-pina-totoy-el-frio-tokisha/LosDeLaPi%C3%B1a%2C%20Totoy%20El%20Frio%20-%20TOKISHA.mp3"></audio>
        <a href="https://dn710209.ca.archive.org/0/items/los-de-la-pina-totoy-el-frio-tokisha/LosDeLaPi%C3%B1a%2C%20Totoy%20El%20Frio%20-%20TOKISHA.mp3" class="boton-de-descarga" download>Descargar MP3</a>
    </div>

    <!-- 2. NUEVO: MALUMA -->
    <div class="tarjeta">
        <img src="https://dn721808.ca.archive.org/0/items/maluma-qhp-pin-ata/cover.jpg" class="cubrir" alt="Carátula Maluma">
        <h3>Maluma - QHP PIÑATA</h3>
        <audio controls src="https://ia801906.us.archive.org/5/items/maluma-qhp-pin-ata/Maluma%20-%20QHP%20PI%C3%91ATA.mp3"></audio>
        <a href="https://ia801906.us.archive.org/5/items/maluma-qhp-pin-ata/Maluma%20-%20QHP%20PI%C3%91ATA.mp3" class="boton-de-descarga" download>Descargar MP3</a>
    </div>

    <!-- 3. ANTERIOR: JULIITO -->
    <div class="tarjeta">
        <img src="https://ia902806.us.archive.org/16/items/j1_20260502/kilo.jpg" class="cubrir">
        <h3>Juliito - K.i.L.O</h3>
        <audio controls src="https://ia902806.us.archive.org/16/items/j1_20260502/Juliito%20-%20K.i.L.O.mp3"></audio>
        <a href="https://ia902806.us.archive.org/16/items/j1_20260502/Juliito%20-%20K.i.L.O.mp3" class="boton-de-descarga" download>Descargar MP3</a>
    </div>

    <!-- 4. ANTERIOR: LA BELLA LUZ -->
    <div class="tarjeta">
        <img src="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/coqueta%20-%20la%20bella%20luz.jpg" class="cubrir">
        <h3>COQUETA - LA BELLA LUZ</h3>
        <audio controls src="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/La%20bella%20luz%20-%20Coqueta.mp3"></audio>
        <a href="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/La%20bella%20luz%20-%20Coqueta.mp3" class="boton-de-descarga" download>Descargar MP3</a>
    </div>

    <script>
        document.getElementById('buscador').addEventListener('keyup', function(e) {
            let texto = e.target.value.toLowerCase();
            let tarjetas = document.querySelectorAll('.tarjeta');
            tarjetas.forEach(tarjeta => {
                let titulo = tarjeta.querySelector('h3').innerText.toLowerCase();
                tarjeta.classList.toggle('hidden', !titulo.includes(texto));
            });
        });

        const todosLosAudios = document.querySelectorAll('audio');
        todosLosAudios.forEach(audioActual => {
            audioActual.addEventListener('play', () => {
                todosLosAudios.forEach(otroAudio => {
                    if (otroAudio !== audioActual) {
                        otroAudio.pause();
                        otroAudio.currentTime = 0;
                    }
                });
            });
        });
    </script>
</body>
</html>
