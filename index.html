<!DOCTYPE html>
<html lang="es">

    <title>MUSICANUEVA</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; padding: 40px; }

        audio { width: 100%; height: 35px; margin-bottom: 20px; filter: invert(1); }
        .boton-descarga { display: block; background: #00f7ff; color: #000; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 8px; text-transform: uppercase; }
        .boton-descarga:hover { background: #fff; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <!-- CANCIÓN 1 -->
    <div class="tarjeta">

        <h3>LA BELLA LUZ - COQUETA</h3>
        <audio controls src="https://ia600102.us.archive.org/3/items/la-bella-luz-coqueta/La%20bella%20luz%20-%20Coqueta.mp3"></audio>
        <a href="https://archive.org" class="boton-descarga" download>DESCARGAR MP3</a>
