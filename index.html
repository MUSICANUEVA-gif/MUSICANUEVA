<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSICANUEVA - ESTILO URBANO</title>
    <style>
        body {
            /* Fondo con imagen de artistas urbanos (puedes cambiar este link por cualquier collage que te guste) */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://unsplash.com'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Oswald', sans-serif; /* Tipografía más urbana */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .tarjeta {
            /* Efecto de cristal para que resalte sobre los artistas del fondo */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 320px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .cubrir {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 3px solid #ff0055; /* Un color más agresivo y urbano */
            box-shadow: 0 0 15px #ff0055;
        }

        h3 {
            color: #fff;
            text-transform: uppercase;
            font-size: 1.4em;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 2px 2px #ff0055;
        }

        audio {
            width: 100%;
            height: 40px;
            margin-bottom: 25px;
            filter: invert(1);
        }

        .boton-descarga {
            display: block;
            background: linear-gradient(45deg, #ff0055, #ffcc00); /* Colores vibrantes tipo graffiti */
            color: #000;
            padding: 15px;
            text-decoration: none;
            font-weight: 900;
            border-radius: 10px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .boton-descarga:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffcc00;
        }
    </style>
    <!-- Fuente Urbana -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="tarjeta">
        <!-- Mantenemos tus enlaces originales de La Bella Luz -->
        <img src="https://archive.org" class="cubrir">
        
        <h3>LA BELLA LUZ - COQUETA</h3>
        
        <audio controls src="https://archive.org"></audio>
        
        <a href="https://archive.org" 
           class="boton-descarga" 
           download="La_Bella_Luz_Coqueta.mp3">
           DESCARGAR MP3
        </a>
    </div>

</body>
</html>
