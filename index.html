<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REPRODUCTOR MUSAICA</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 40px; }
        .tarjeta { background: #000; border: 2px solid #00f7ff; border-radius: 15px; width: 300px; padding: 20px; text-align: center; box-shadow: 0 0 20px #00f7ff; }
        .cubrir { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        h3 { color: #00f7ff; margin-bottom: 15px; font-size: 1.1em; }
        audio { width: 100%; height: 35px; margin-bottom: 20px; filter: invert(1); }
        .boton-descarga { display: block; background: #00f7ff; color: #000; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 8px; text-transform: uppercase; transition: 0.3s; }
        .boton-descarga:hover { background: #fff; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <div class="tarjeta">
        <!-- Imagen que me pasaste -->
        <img src="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/coqueta%20-%20la%20bella%20luz.jpg" class="cubrir">
        
        <h3>LA BELLA LUZ - COQUETA</h3>
        
        <!-- Reproductor -->
        <audio controls src="https://archive.org"></audio>
        
        <!-- Botón de descarga directa -->
        <a href="https://archive.org" 
           class="boton-descarga" 
           download="La_Bella_Luz_Coqueta.mp3">
           DESCARGAR MP3
        </a>
    </div>

</body>
</html>
