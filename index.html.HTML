<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSICA NUEVA</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            align-content: flex-start;
            gap: 20px; 
            min-height: 100vh; 
        }
        .header-principal {
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
        }
        .header-principal h1 {
            color: #00f7ff;
            text-shadow: 0 0 10px #00f7ff;
            font-size: 2rem;
            text-transform: uppercase;
        }
        .tarjeta { 
            background: #000; 
            border: 2px solid #00f7ff; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 280px; 
            padding: 15px 15px 0px 15px; 
            text-align: center; 
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.4); 
            overflow: hidden;
        }
        .cubrir { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            display: block;
        }
        h3 { color: #fff; margin-bottom: 15px; font-size: 1.1em; height: 1.2em; overflow: hidden; text-transform: uppercase; }
        audio { 
            width: 100%; 
            height: 35px; 
            margin-bottom: 15px; 
            filter: invert(1); 
        }
        .boton-de-descarga { 
            display: block; 
            background: #00f7ff; 
            color: #000; 
            padding: 18px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.9em;
            margin: 0 -15px; 
            transition: background 0.3s;
        }
        .boton-de-descarga:hover { background: #fff; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="header-principal">
        <h1>MUSICA NUEVA</h1>
    </div>

    <!-- CANCIÓN 1: JULIITO -->
    <div class="tarjeta">
        <img src="https://ia902806.us.archive.org/16/items/j1_20260502/kilo.jpg" class="cubrir">
        <h3>Juliito - K.i.L.O</h3>
        <audio controls src="https://ia902806.us.archive.org/16/items/j1_20260502/Juliito%20-%20K.i.L.O.mp3"></audio>
        <a href="https://ia902806.us.archive.org/16/items/j1_20260502/Juliito%20-%20K.i.L.O.mp3" class="boton-de-descarga" download>Descargar MP3</a>
    </div>

    <!-- CANCIÓN 2: LA BELLA LUZ -->
    <div class="tarjeta">
        <img src="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/coqueta%20-%20la%20bella%20luz.jpg" class="cubrir">
        <h3>COQUETA - LA BELLA LUZ</h3>
        <audio controls src="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/La%20bella%20luz%20-%20Coqueta.mp3"></audio>
        <a href="https://dn710406.ca.archive.org/0/items/la-bella-luz-coqueta/La%20bella%20luz%20-%20Coqueta.mp3" class="boton-de-descarga" download>Descargar MP3</a>
    </div>

</body>
</html>
